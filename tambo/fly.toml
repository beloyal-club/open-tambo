app = "open-tambo"
primary_region = "iad"

[build]
  dockerfile = "apps/api/Dockerfile"

[deploy]
  release_command = "npm -w @tambo-ai-cloud/db run db:migrate"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"
