app = "open-tambo-web"
primary_region = "iad"

[build]
  dockerfile = "apps/web/Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"
  NEXT_PUBLIC_TAMBO_API_URL = "https://open-tambo.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  size = "shared-cpu-2x"
  memory = "512mb"
